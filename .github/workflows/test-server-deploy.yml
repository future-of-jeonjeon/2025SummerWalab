name: Deploy to Test Server

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  front:
    name: Build Frontend (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Build front page
        run: |
          cd ./hgu-oj-front
          printf "VITE_API_URL=%s\n" "${{ secrets.VITE_TEST_API_URL }}" > .env
          printf "VITE_MS_API_BASE=%s\n" "${{ secrets.VITE_TEST_MS_API_BASE }}" >> .env
          printf "VITE_CODE_AUTO_SAVE_INTERVAL_SECONDS=%s\n" "${{ secrets.VITE_CODE_AUTO_SAVE_INTERVAL_SECONDS }}" >> .env
          printf "VITE_CODE_AUTO_SAVE_CACHE_TTL_SECONDS=%s\n" "${{ secrets.VITE_CODE_AUTO_SAVE_CACHE_TTL_SECONDS }}" >> .env
          printf "VITE_GOOGLE_CLIENT_ID=%s\n" "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env
          printf "VITE_GOOGLE_REDIRECT_URI=%s\n" "${{ secrets.VITE_TEST_GOOGLE_REDIRECT_URL }}" >> .env
          npm ci
          npm install -D @types/node
          npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hgu-oj-front/dist
          if-no-files-found: error

  ms-build:
    name: Build & Push Micro Service Image (arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push micro-service image
        run: |
          docker buildx build --platform linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/oj-micro-service:latest \
            --push ./micro-service-server

  deploy:
    name: Deploy on Test Server (frontend + ms only)
    runs-on: ubuntu-latest
    needs: [front, ms-build]

    steps:
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy frontend on server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          port: 2222
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/judge-test/www/"
          strip_components: 1

      - name: Deploy micro-service on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          port: 2222
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/judge-test/
            echo ${{ secrets.TEST_SERVER_PASSWORD }} | sudo -S docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            echo ${{ secrets.TEST_SERVER_PASSWORD }} | sudo -S docker compose pull oj-micro-service
            echo ${{ secrets.TEST_SERVER_PASSWORD }} | sudo -S docker compose up -d oj-micro-service
            echo ${{ secrets.TEST_SERVER_PASSWORD }} | sudo -S docker logout
