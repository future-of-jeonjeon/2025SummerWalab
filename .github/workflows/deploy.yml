name: Deploy to Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  front:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Build front page
        run: |
          cd ./hgu-oj-front
          printf "VITE_API_URL=%s\n" "${{ secrets.VITE_API_URL }}" > .env
          printf "VITE_MS_API_BASE=%s\n" "${{ secrets.VITE_MS_API_BASE }}" >> .env
          printf "VITE_CODE_AUTO_SAVE_INTERVAL_SECONDS=%s\n" "${{ secrets.VITE_CODE_AUTO_SAVE_INTERVAL_SECONDS }}" >> .env
          printf "VITE_CODE_AUTO_SAVE_CACHE_TTL_SECONDS=%s\n" "${{ secrets.VITE_CODE_AUTO_SAVE_CACHE_TTL_SECONDS }}" >> .env
          printf "VITE_GOOGLE_CLIENT_ID=%s\n" "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env
          printf "VITE_GOOGLE_REDIRECT_URI=%s\n" "${{ secrets.VITE_GOOGLE_REDIRECT_URI }}" >> .env
          npm ci
          npm install -D @types/node
          npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hgu-oj-front/dist
          if-no-files-found: error

  backend-build:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/oj-backend:latest ./OnlineJudge
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oj-backend:latest

  ms-build:
    name: Build & Push Micro Service Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push micro-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/oj-micro-service:latest ./micro-service-server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oj-micro-service:latest

  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    needs: [front, backend-build, ms-build]

    steps:
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy frontend on server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "~/www/judge"
          strip_components: 1

      - name: Deploy backend & micro-service on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd ~/hgu-oj
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose pull
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker compose up -d
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S docker logout
