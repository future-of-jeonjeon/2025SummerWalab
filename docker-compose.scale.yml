version: "3"
services:
  oj-judge-6:
    image: registry.cn-hongkong.aliyuncs.com/oj-image/judge:1.6.1
    container_name: oj-judge-6
    restart: always
    read_only: true
    cap_drop:
      - SETPCAP
      - MKNOD
      - NET_BIND_SERVICE
      - SYS_CHROOT
      - SETFCAP
      - FSETID
    tmpfs:
      - /tmp
    volumes:
      - ./data/backend/test_case:/test_case:ro
      # 중요: 로그 폴더와 실행 폴더를 겹치지 않게 번호별로 따로 지정해야 합니다.
      - ./data/judge_server/oj-judge-6/log:/log
      - ./data/judge_server/oj-judge-6/run:/judger
    environment:
      # 중요: 백엔드가 구분할 수 있게 주소와 이름을 다르게 설정해야 합니다.
      - SERVICE_URL=http://oj-judge-6:8080
      - BACKEND_URL=http://oj-backend:8000/api/judge_server_heartbeat/
      - TOKEN=${JUDGE_SERVER_TOKEN}
    networks:
      - judge-network

  # 더 필요하면 아래처럼 복사해서 7번, 8번을 만드세요
  # oj-judge-7:
  #   image: ...
  #   volumes:
  #     - ./data/judge_server/oj-judge-7/log:/log
  #     - ./data/judge_server/oj-judge-7/run:/judger
  #   environment:
  #     - SERVICE_URL=http://oj-judge-7:8080
  #   ...

networks:
  judge-network:
    external: true
